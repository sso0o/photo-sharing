name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ======================
      # Node (frontend)
      # ======================
      - name: Node 설치
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 프론트 빌드
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # ======================
      # 프론트 결과 → 백엔드 static 복사
      # ======================
      - name: static 복사
        run: |
          mkdir -p backend/src/main/resources/static
          rm -rf backend/src/main/resources/static/*
          cp -r frontend/dist/* backend/src/main/resources/static/


      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 백엔드 빌드
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew build -x test

      - name: jar 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/home/ec2-user/app"
          overwrite: true

      - name: 서버 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export MONGODB_URI=${{ secrets.MONGODB_URI }}
            export AWS_REGION=${{ secrets.AWS_REGION }}
            export S3_BUCKET=${{ secrets.S3_BUCKET }}
            export AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            export AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            
            cd /home/ec2-user/app
            
            # 기존 서버 종료 (안 죽어도 에러 안 나게)
            ps -ef | grep 'backend-0.0.1-SNAPSHOT.jar' | grep -v grep | awk '{print $2}' | xargs -r kill -9 || true
            
            # 실행
            nohup java -jar backend-0.0.1-SNAPSHOT.jar > app.log 2>&1 &